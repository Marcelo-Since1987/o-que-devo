<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#7c3aed"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="O Que Devo"/>
<title>O Que Devo</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#081028;--bg2:#0b1020;--surf:#0f1724;--surf2:#0b1220;--bord:rgba(124,58,237,0.06);--bord2:rgba(124,58,237,0.08);--tx:#e6eef8;--mu:#9aa3bf;--gr:#10b981;--grd:rgba(16,185,129,0.12);--grb:rgba(16,185,129,0.12);--rd:#ef4444;--rdd:rgba(239,68,68,0.06);--rdb:rgba(239,68,68,0.12);--ac:#7c3aed;--acd:rgba(124,58,237,0.06);--acb:rgba(124,58,237,0.12);--am:#f59e0b;--amd:rgba(245,158,11,0.06);--amb:rgba(245,158,11,0.12)}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(135deg,#081028 0%,#0b1020 100%);color:var(--tx);font-family:'Inter',sans-serif}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative}
.hdr{padding:max(env(safe-area-inset-top,16px),16px) 20px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px}
.app-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);font-weight:600;font-family:'Sora',sans-serif}
#btn-add{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;box-shadow:0 6px 24px rgba(124,58,237,0.16)}
#btn-add:hover{transform:scale(1.04)}
.hero{padding:8px 0 24px}
.hero-lbl{font-size:12px;color:var(--mu);margin-bottom:8px;font-weight:500}
.hero-val{font-family:'Sora',monospace;font-size:42px;font-weight:700;line-height:1.1;transition:all .35s;color:var(--ac);background:linear-gradient(135deg,#7c3aed 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-val.zero{background:linear-gradient(135deg,#10b981 0%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:12px;color:var(--mu);margin-top:6px;font-weight:500}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-bottom:16px}
.sc{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid var(--bord2);border-radius:12px;padding:14px;backdrop-filter:blur(6px);transition:all .2s;box-shadow:0 6px 20px rgba(12,16,32,0.6)}
.sc-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);margin-bottom:6px;font-weight:600}
.sc-val{font-family:'Sora',monospace;font-size:18px;font-weight:700}
.sc-val.g{color:var(--gr)}.sc-val.r{color:var(--rd)}
.filters{display:flex;gap:8px;padding-bottom:16px}
.fb{padding:8px 16px;border-radius:10px;font-size:12px;border:1px solid var(--bord2);background:transparent;color:var(--mu);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;font-weight:600}
.fb.on{background:linear-gradient(90deg, rgba(124,58,237,0.18), rgba(124,58,237,0.08));color:#fff;box-shadow:0 8px 24px rgba(124,58,237,0.08)}
.scroll{flex:1;overflow-y:auto;padding:0 20px 24px;min-height:0;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:6px}
.scroll::-webkit-scrollbar-thumb{background:linear-gradient(180deg, rgba(124,58,237,0.3), rgba(16,185,129,0.2));border-radius:6px}
#lst{display:flex;flex-direction:column;gap:12px}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 0;gap:12px;color:var(--mu)}
.card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.1));border-radius:14px;border:1px solid rgba(124,58,237,0.06);overflow:hidden;animation:si .22s ease;transition:all .2s;box-shadow:0 8px 30px rgba(2,6,23,0.6);position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(20,22,48,0.7)}
@keyframes si{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cstripe{height:6px;border-radius:4px}
.cstripe.paid{background:linear-gradient(90deg,#10b981 0%,#34d399 100%)}.cstripe.overdue{background:linear-gradient(90deg,#f59e0b 0%,#fbbf24 100%)}.cstripe.pending{background:linear-gradient(90deg,#f97316 0%,#fb923c 100%)}
.cbody{padding:14px}
.crow1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.cname{font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.camt{font-family:'Sora',monospace;font-size:16px;font-weight:700;flex-shrink:0}
.camt.paid{color:var(--gr)}.camt.pending,.camt.overdue{color:var(--rd)}
.crow2{display:flex;justify-content:space-between;align-items:center}
.cdate{font-size:12px;color:var(--mu);font-weight:500}
.badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase}
.badge.paid{background:linear-gradient(90deg, rgba(16,185,129,0.08), rgba(16,185,129,0.04));color:var(--gr);border:1px solid rgba(16,185,129,0.12);box-shadow:0 6px 18px rgba(16,185,129,0.06)}
.badge.pending{background:linear-gradient(90deg, rgba(239,68,68,0.04), rgba(239,68,68,0.02));color:var(--rd);border:1px solid rgba(239,68,68,0.06)}
.cacts{display:flex;gap:8px;padding:12px 14px 16px;border-top:1px solid rgba(255,255,255,0.02)}
.ab{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--bord2);background:transparent;font-family:'Inter',sans-serif;font-size:12px;color:var(--mu);cursor:pointer;font-weight:700;transition:all .12s}
.ab.pay{border-color:rgba(16,185,129,0.12);color:var(--gr);background:linear-gradient(90deg, rgba(16,185,129,0.04), transparent)}
.ab.del{border-color:rgba(239,68,68,0.12);color:var(--rd)}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
#ov.open{opacity:1;pointer-events:all}
.mod{background:linear-gradient(180deg,#0f1724 0%,#0b1220 100%);width:100%;max-width:480px;border-radius:18px 18px 0 0;border:1px solid rgba(124,58,237,0.06);padding-bottom:max(env(safe-area-inset-bottom,16px),16px);transform:translateY(100%);transition:transform .22s ease}
#ov.open .mod{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:rgba(255,255,255,0.02);border-radius:99px;margin:12px auto 0}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.02)}
.mtitle{font-size:16px;font-weight:700;color:var(--tx)}
.mclose{width:32px;height:32px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:var(--mu);font-size:16px;display:flex;align-items:center;justify-content:center}
.mbody{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:7px;font-weight:600}
.fld input{width:100%;background:transparent;border:1px solid rgba(255,255,255,0.03);border-radius:10px;padding:12px 14px;font-family:'Inter',sans-serif;font-size:15px;color:var(--tx);outline:none;transition:all .12s}
.fld input:focus{border-color:var(--ac);box-shadow:0 6px 20px rgba(124,58,237,0.06)}
.ptog{display:flex;align-items:center;gap:12px;background:transparent;border:1px solid rgba(255,255,255,0.02);border-radius:10px;padding:12px 14px;cursor:pointer}
.ttrack{width:44px;height:24px;border-radius:99px;background:rgba(255,255,255,0.02);position:relative;transition:background .2s;flex-shrink:0}
.ttrack.on{background:linear-gradient(135deg,#10b981 0%,#34d399 100%)}
.tthumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.ttrack.on .tthumb{transform:translateX(20px)}
.plbl{font-size:14px;color:var(--tx);font-weight:700}
.merr{font-size:12px;color:var(--rd);text-align:center;padding:8px 20px;background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.06);border-radius:10px;margin:0 20px}
.mfoot{display:flex;gap:10px;padding:12px 20px 0}
.bcancel{flex:1;padding:13px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--mu);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.bsave{flex:2;padding:13px;border-radius:10px;background:linear-gradient(90deg,#7c3aed 0%,#6d28d9 100%);border:none;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
/* futuristic paid animation (2D) */
.pay-anim{animation:payAnim .48s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes payAnim{0%{transform:translateX(0) rotate(0) scale(1);filter:drop-shadow(0 0 0 rgba(124,58,237,0))}20%{transform:translateX(-10px) rotate(-8deg) scale(1.02);filter:drop-shadow(0 8px 24px rgba(124,58,237,0.12))}60%{transform:translateX(12px) rotate(8deg) scale(1.04);filter:drop-shadow(0 18px 40px rgba(16,185,129,0.12))}100%{transform:translateX(0) rotate(0) scale(1);filter:drop-shadow(0 12px 30px rgba(16,185,129,0.06));box-shadow:0 18px 40px rgba(12,18,36,0.6)}}
/* subtle unpay animation */
.unpay-anim{animation:unpayAnim .36s ease forwards}
@keyframes unpayAnim{0%{transform:scale(1);opacity:1}50%{transform:scale(.98);opacity:.9}100%{transform:scale(1);opacity:1}}
/* check overlay */
.pay-check{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,rgba(124,58,237,0.95),rgba(16,185,129,0.95));display:flex;align-items:center;justify-content:center;z-index:30;color:#fff;font-size:30px;font-weight:800;box-shadow:0 12px 40px rgba(16,185,129,0.18),0 6px 18px rgba(124,58,237,0.12);animation:checkPop .36s ease forwards}
@keyframes checkPop{0%{transform:translate(-50%,-60%) scale(.6);opacity:0}60%{transform:translate(-50%,-50%) scale(1.08);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.pay-check.fade-away{animation:checkFade .28s ease forwards}
@keyframes checkFade{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-40%) scale(.9)}}
.pay-check svg{width:36px;height:36px;filter:drop-shadow(0 6px 18px rgba(16,185,129,0.18))}
/* small neon accent for paid badge */
.badge.paid::after{content:'';display:block;position:absolute;right:12px;top:8px;width:6px;height:6px;border-radius:50%;background:linear-gradient(90deg,#34d399,#10b981);box-shadow:0 6px 18px rgba(16,185,129,0.12)}
#install-bar{display:none;margin:0 20px 12px;background:linear-gradient(90deg,rgba(124,58,237,0.06),rgba(16,185,129,0.03));border:1px solid rgba(124,58,237,0.06);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--ac);align-items:center;gap:10px;font-weight:700}
#install-bar.show{display:flex}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <span class="app-lbl">O Que Devo</span>
      <button id="btn-add" onclick="openMod()">+</button>
    </div>
    <div class="hero">
      <p class="hero-lbl">Total em aberto</p>
      <p class="hero-val" id="htotal">R$ 0,00</p>
      <p class="hero-sub" id="hsub">carregando...</p>
    </div>
    <div class="stats">
      <div class="sc"><p class="sc-lbl">Já pago</p><p class="sc-val g" id="spaid">R$ 0,00</p></div>
      <div class="sc"><p class="sc-lbl">Pendente</p><p class="sc-val r" id="spend">R$ 0,00</p></div>
    </div>
    <div id="install-bar" onclick="doInstall()">
      ⬇ Toque para instalar o app no seu celular
      <span onclick="event.stopPropagation();this.parentElement.classList.remove('show')" style="margin-left:auto;opacity:.6">✕</span>
    </div>
    <div class="filters">
      <button class="fb on" onclick="setF('all',this)">Todas</button>
      <button class="fb" onclick="setF('pending',this)">Pendentes</button>
      <button class="fb" onclick="setF('paid',this)">Pagas</button>
    </div>
  </div>
  <div class="scroll">
    <div id="lst"></div>
    <div id="empty" class="empty" style="display:none">
      <div class="empty-ico">💸</div>
      <p class="empty-tx">Nenhuma conta aqui.<br>Toque no + para adicionar.</p>
    </div>
  </div>
  <div id="ov" onclick="ovClick(event)">
    <div class="mod">
      <div class="mhandle"></div>
      <div class="mhdr">
        <span class="mtitle" id="mtitle">Nova conta</span>
        <button class="mclose" onclick="closeMod()">✕</button>
      </div>
      <div class="mbody">
        <div class="fld"><label>Nome / Descrição</label><input id="iname" type="text" placeholder="Ex: Aluguel, Cartão, Luz..." autocomplete="off"/></div>
        <div class="fld"><label>Valor (R$)</label><input id="ival" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0,00"/></div>
        <div class="fld"><label>Data de vencimento</label><input id="idate" type="date"/></div>
        <div class="ptog" onclick="togPaid()">
          <div class="ttrack" id="ttrack"><div class="tthumb"></div></div>
          <span class="plbl">Marcar como pago</span>
        </div>
      </div>
      <p class="merr" id="merr" style="display:none">Preencha todos os campos.</p>
      <div class="mfoot">
        <button class="bcancel" onclick="closeMod()">Cancelar</button>
        <button class="bsave" onclick="saveIt()">Salvar</button>
      </div>
    </div>
  </div>
</div>
<script>
const K='qdv4';
let items=[],editId=null,filt='all',paidSt=false,deferredPrompt=null;

window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-bar').classList.add('show');});
window.addEventListener('appinstalled',()=>{document.getElementById('install-bar').classList.remove('show');});
function doInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}}

function load(){
  try{items=JSON.parse(localStorage.getItem(K)||'[]');}catch(e){console.warn('localStorage parse error',e);items=[];}
  // Seed example data if empty (safe and simple)
  if(!items || !items.length){
    const t=new Date();
    const fmt=d=>d.toISOString().split('T')[0];
    const d1=new Date(t); d1.setDate(t.getDate()+3);
    const d2=new Date(t); d2.setDate(t.getDate()+10);
    items=[
      {id: genId(),name:'Aluguel',value:1500.00,date:fmt(d1),paid:false},
      {id: genId(),name:'Streaming',value:29.90,date:fmt(d2),paid:true}
    ];
    persist();
  }
}
function persist(){try{localStorage.setItem(K,JSON.stringify(items));}catch(e){console.warn('persist error',e);}}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function fc(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(s){if(!s) return ''; return new Date(s+'T00:00:00').toLocaleDateString('pt-BR');}
function isOv(i){if(i.paid) return false; const n=new Date(); n.setHours(0,0,0,0); return new Date(i.date+'T00:00:00')<n;}
function st(i){ if(i.paid) return 'paid'; return isOv(i)?'overdue':'pending'; }
function stL(s){ return {paid:'Pago',pending:'Pendente',overdue:'Atrasado'}[s] }
function esc(s){ if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  // totals
  const totalAll = items.reduce((a,i)=>a+Number(i.value||0),0);
  const paidTotal = items.filter(i=>i.paid).reduce((a,i)=>a+Number(i.value||0),0);
  const pendingTotal = items.filter(i=>!i.paid).reduce((a,i)=>a+Number(i.value||0),0);

  // Update header
  const htotal = document.getElementById('htotal');
  htotal.textContent = fc(pendingTotal);
  htotal.classList.remove('zero');
  if(pendingTotal===0){ htotal.classList.add('zero'); }
  document.getElementById('spaid').textContent = fc(paidTotal);
  document.getElementById('spend').textContent = fc(pendingTotal);
  document.getElementById('hsub').textContent = items.length+' contas • Total geral: '+fc(totalAll);

  // list
  const lst = document.getElementById('lst'); lst.innerHTML='';
  const visible = items.filter(i=>{
    if(filt==='all') return true;
    if(filt==='paid') return i.paid;
    if(filt==='pending') return !i.paid;
    return true;
  });

  if(!visible.length){ document.getElementById('empty').style.display='flex'; return; } else { document.getElementById('empty').style.display='none'; }

  visible.sort((a,b)=> new Date(a.date) - new Date(b.date));

  visible.forEach(i=>{
    const s = st(i);
    const card = document.createElement('div'); card.className='card'; card.dataset.id = i.id;
    const stripe = document.createElement('div'); stripe.className='cstripe '+s; card.appendChild(stripe);
    const body = document.createElement('div'); body.className='cbody';

    const row1 = document.createElement('div'); row1.className='crow1';
    const cname = document.createElement('div'); cname.className='cname'; cname.textContent = i.name;
    const camt = document.createElement('div'); camt.className='camt '+s; camt.textContent = fc(i.value);
    row1.appendChild(cname); row1.appendChild(camt);

    const row2 = document.createElement('div'); row2.className='crow2';
    const cdate = document.createElement('div'); cdate.className='cdate'; cdate.textContent = fd(i.date);
    const badge = document.createElement('div'); badge.className='badge '+s; badge.textContent = stL(s);
    row2.appendChild(cdate); row2.appendChild(badge);

    body.appendChild(row1); body.appendChild(row2);

    const acts = document.createElement('div'); acts.className='cacts';
    const btnPay = document.createElement('button'); btnPay.className='ab pay'; btnPay.textContent='Marcar'; btnPay.onclick = ()=>{ togglePaid(i.id); };
    const btnEdit = document.createElement('button'); btnEdit.className='ab'; btnEdit.textContent='Editar'; btnEdit.onclick = ()=>{ openMod(i.id); };
    const btnDel = document.createElement('button'); btnDel.className='ab del'; btnDel.textContent='Excluir'; btnDel.onclick = ()=>{ del(i.id); };
    acts.appendChild(btnPay); acts.appendChild(btnEdit); acts.appendChild(btnDel);

    card.appendChild(body); card.appendChild(acts);
    lst.appendChild(card);
  });
}

function setF(f,btn){ filt=f; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on')); if(btn) btn.classList.add('on'); render(); }
function togglePaid(id){
  const i = items.find(x=>x.id===id); if(!i) return;
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if(card){
    if(card.classList.contains('animating')) return; // prevent double clicks
    card.classList.add('animating');
    const willMark = !i.paid;
    const animClass = willMark ? 'pay-anim' : 'unpay-anim';
    card.classList.add(animClass);

    // add check overlay when marking as paid
    let checkEl = null;
    if(willMark){
      checkEl = document.createElement('div'); checkEl.className = 'pay-check';
      checkEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      card.appendChild(checkEl);
    }

    const onEnd = (e)=>{
      if(e.animationName === 'payAnim' || e.animationName === 'unpayAnim'){
        card.removeEventListener('animationend', onEnd);
        card.classList.remove(animClass);
        // play a light fade-out for check and then remove
        if(checkEl){ checkEl.classList.add('fade-away'); setTimeout(()=>{ if(checkEl && checkEl.parentElement) checkEl.parentElement.removeChild(checkEl); }, 320); }
        card.classList.remove('animating');
        i.paid = !i.paid; persist(); render();
      }
    };
    card.addEventListener('animationend', onEnd);
  } else {
    i.paid = !i.paid; persist(); render();
  }
}
function del(id){ if(confirm('Excluir esta conta?')){ items = items.filter(x=>x.id!==id); persist(); render(); } }

function openMod(id){
  editId = id || null;
  document.getElementById('merr').style.display='none';
  paidSt = false; document.getElementById('ttrack').className='ttrack';
  if(id){
    const it = items.find(x=>x.id===id);
    if(it){
      document.getElementById('mtitle').textContent='Editar conta';
      document.getElementById('iname').value = it.name || '';
      document.getElementById('ival').value = Number(it.value||0);
      document.getElementById('idate').value = it.date || '';
      paidSt = !!it.paid; if(paidSt) document.getElementById('ttrack').className='ttrack on';
    }
  } else {
    document.getElementById('mtitle').textContent='Nova conta';
    document.getElementById('iname').value = '';
    document.getElementById('ival').value = '';
    document.getElementById('idate').value = '';
    paidSt = false;
  }
  document.getElementById('ov').classList.add('open');
}

function closeMod(){ document.getElementById('ov').classList.remove('open'); }
function ovClick(e){ if(e.target.id==='ov') closeMod(); }

function togPaid(){ paidSt = !paidSt; document.getElementById('ttrack').className = 'ttrack'+(paidSt?' on':''); }

function saveIt(){
  const name = document.getElementById('iname').value.trim();
  const valRaw = document.getElementById('ival').value;
  const date = document.getElementById('idate').value;
  const err = document.getElementById('merr');
  const val = parseFloat(valRaw) || 0;
  if(!name || !date || isNaN(val)){
    err.style.display='block'; return;
  }
  err.style.display='none';
  if(editId){
    const it = items.find(x=>x.id===editId);
    if(it){ it.name = name; it.value = Number(val.toFixed(2)); it.date = date; it.paid = !!paidSt; }
  } else {
    items.push({id: genId(), name, value: Number(val.toFixed(2)), date, paid: !!paidSt});
  }
  persist(); render(); closeMod();
}

// service worker quick caching (non-critical)
if('serviceWorker' in navigator){
  try{
    const sw = `self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
    const b = new Blob([sw],{type:'application/javascript'});
    const url = URL.createObjectURL(b);
    navigator.serviceWorker.register(url).catch(()=>{});
  }catch(e){console.warn('sw err',e)}
}

load(); render();
</script>
