<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#7c3aed"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="O Que Devo"/>
<title>O Que Devo</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f1ff;--bg2:#ede5ff;--surf:#ffffff;--surf2:#f9f7ff;--bord:rgba(124,58,237,0.08);--bord2:rgba(124,58,237,0.12);--tx:#1f1535;--mu:#6b5b95;--gr:#10b981;--grd:rgba(16,185,129,0.12);--grb:rgba(16,185,129,0.12);--rd:#ef4444;--rdd:rgba(239,68,68,0.06);--rdb:rgba(239,68,68,0.12);--ac:#7c3aed;--acd:rgba(124,58,237,0.08);--acb:rgba(124,58,237,0.12);--am:#ef4444;--amd:rgba(239,68,68,0.06);--amb:rgba(239,68,68,0.12)}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);color:var(--tx);font-family:'Inter',sans-serif}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative}
.hdr{padding:max(env(safe-area-inset-top,16px),16px) 20px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px}
.app-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);font-weight:600;font-family:'Sora',sans-serif}
.controls{display:flex;gap:8px;align-items:center}
#btn-settings{width:40px;height:40px;border-radius:10px;background:transparent;border:1px solid var(--bord2);display:flex;align-items:center;justify-content:center;cursor:pointer}
#btn-add{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--ac) 0%,#6d28d9 100%);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;box-shadow:0 6px 24px rgba(124,58,237,0.12)}
#btn-add:hover{transform:scale(1.03)}
.hero{padding:8px 0 16px}
.hero-lbl{font-size:12px;color:var(--mu);margin-bottom:8px;font-weight:500}
.hero-val{font-family:'Sora',monospace;font-size:42px;font-weight:700;line-height:1.1;transition:all .25s;color:var(--ac);background:linear-gradient(135deg,var(--ac) 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-val.zero{background:linear-gradient(135deg,#10b981 0%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* minimal overdue styling: only change color, no heavy borders/shadows */
.hero-val.overdue{background:none;color:var(--rd);border-radius:6px;padding:4px 8px;border:1px solid rgba(239,68,68,0.04)}
.hero-sub{font-size:12px;color:var(--mu);margin-top:6px;font-weight:500}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-bottom:16px}
.sc{background:var(--surf);border:1px solid var(--bord2);border-radius:12px;padding:14px;backdrop-filter:blur(6px);transition:all .18s;box-shadow:0 6px 18px rgba(124,58,237,0.04)}
.sc-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);margin-bottom:6px;font-weight:600}
.sc-val{font-family:'Sora',monospace;font-size:18px;font-weight:700}
.sc-val.g{color:var(--gr)}.sc-val.r{color:var(--rd)}
.filters{display:flex;gap:8px;padding-bottom:12px}
.fb{padding:8px 16px;border-radius:10px;font-size:12px;border:1px solid var(--bord2);background:var(--surf);color:var(--mu);cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;font-weight:600}
.fb.on{background:linear-gradient(90deg, rgba(124,58,237,0.12), rgba(124,58,237,0.06));color:#fff}
.scroll{flex:1;overflow-y:auto;padding:0 20px 22px;min-height:0;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:6px}
.scroll::-webkit-scrollbar-thumb{background:linear-gradient(180deg, rgba(124,58,237,0.2), rgba(124,58,237,0.12));border-radius:6px}
#lst{display:flex;flex-direction:column;gap:12px}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 0;gap:12px;color:var(--mu)}
.card{background:var(--surf);border-radius:14px;border:1px solid var(--bord2);overflow:hidden;animation:si .22s ease;transition:all .18s;box-shadow:0 6px 18px rgba(124,58,237,0.04);position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(124,58,237,0.06)}
/* remove heavy overdue highlight: keep it subtle */
.card.overdue{border:1px solid rgba(239,68,68,0.06);}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cstripe{height:6px;border-radius:4px}
.cstripe.paid{background:linear-gradient(90deg,#10b981 0%,#34d399 100%)}.cstripe.overdue{background:linear-gradient(90deg,#ef4444 0%,#fb7185 100%)}.cstripe.pending{background:linear-gradient(90deg,#f97316 0%,#fb923c 100%)}
.cbody{padding:14px}
.crow1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.cname{font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.camt{font-family:'Sora',monospace;font-size:16px;font-weight:700;flex-shrink:0}
.camt.paid{color:var(--gr)}.camt.pending,.camt.overdue{color:var(--rd)}
.crow2{display:flex;justify-content:space-between;align-items:center}
.cdate{font-size:12px;color:var(--mu);font-weight:500}
.badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase;position:relative}
.badge.paid{background:linear-gradient(90deg, rgba(16,185,129,0.08), rgba(16,185,129,0.04));color:var(--gr);border:1px solid rgba(16,185,129,0.12)}
.badge.pending{background:linear-gradient(90deg, rgba(239,68,68,0.04), rgba(239,68,68,0.02));color:var(--rd);border:1px solid rgba(239,68,68,0.06)}
/* overdue badge: minimal background, strong red text only per request */
.badge.overdue{background:transparent;color:var(--rd);border:1px solid rgba(239,68,68,0.04);font-weight:800}
.cacts{display:flex;gap:8px;padding:12px 14px 16px;border-top:1px solid var(--bord)}
.ab{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--bord2);background:transparent;font-family:'Inter',sans-serif;font-size:12px;color:var(--mu);cursor:pointer;font-weight:700;transition:all .12s}
.ab.pay{border-color:rgba(16,185,129,0.12);color:var(--gr);background:linear-gradient(90deg, rgba(16,185,129,0.04), transparent)}
.ab.del{border-color:rgba(239,68,68,0.12);color:var(--rd)}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.12);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
#ov.open{opacity:1;pointer-events:all}
.mod{background:var(--surf2);width:100%;max-width:480px;border-radius:12px 12px 0 0;border:1px solid var(--bord2);padding-bottom:max(env(safe-area-inset-bottom,16px),16px);transform:translateY(100%);transition:transform .22s ease}
#ov.open .mod{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:var(--bord2);border-radius:99px;margin:12px auto 0}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--bord)}
.mtitle{font-size:16px;font-weight:700;color:var(--tx)}
.mclose{width:32px;height:32px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:var(--mu);font-size:16px;display:flex;align-items:center;justify-content:center}
.mbody{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:7px;font-weight:600}
.fld input{width:100%;background:transparent;border:1px solid var(--bord2);border-radius:10px;padding:12px 14px;font-family:'Inter',sans-serif;font-size:15px;color:var(--tx);outline:none;transition:all .12s}
.fld input:focus{border-color:var(--ac);box-shadow:0 6px 18px rgba(124,58,237,0.06)}
.ptog{display:flex;align-items:center;gap:12px;background:transparent;border:1px solid var(--bord2);border-radius:10px;padding:12px 14px;cursor:pointer}
.ttrack{width:44px;height:24px;border-radius:99px;background:var(--bord2);position:relative;transition:background .2s;flex-shrink:0}
.ttrack.on{background:linear-gradient(135deg,#10b981 0%,#34d399 100%)}
.tthumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.ttrack.on .tthumb{transform:translateX(20px)}
.plbl{font-size:14px;color:var(--tx);font-weight:700}
.merr{font-size:12px;color:var(--rd);text-align:center;padding:8px 20px;background:var(--rdd);border:1px solid var(--rdb);border-radius:10px;margin:0 20px}
.mfoot{display:flex;gap:10px;padding:12px 20px 0}
.bcancel{flex:1;padding:13px;border-radius:10px;background:transparent;border:1px solid var(--bord2);color:var(--mu);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.bsave{flex:2;padding:13px;border-radius:10px;background:linear-gradient(90deg,var(--ac) 0%,#6d28d9 100%);border:none;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
/* animations */
.pay-anim{animation:payAnim .48s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes payAnim{0%{transform:translateX(0) rotate(0) scale(1);filter:drop-shadow(0 0 0 rgba(124,58,237,0))}20%{transform:translateX(-10px) rotate(-6deg) scale(1.02);filter:drop-shadow(0 8px 24px rgba(124,58,237,0.08))}60%{transform:translateX(10px) rotate(6deg) scale(1.04);filter:drop-shadow(0 18px 40px rgba(16,185,129,0.12))}100%{transform:translateX(0) rotate(0) scale(1);filter:drop-shadow(0 12px 30px rgba(16,185,129,0.06))}}
.unpay-anim{animation:unpayAnim .36s ease forwards}
@keyframes unpayAnim{0%{transform:scale(1);opacity:1}50%{transform:scale(.99);opacity:.95}100%{transform:scale(1);opacity:1}}
/* check overlay and particles */
.pay-check{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,var(--ac),var(--am));display:flex;align-items:center;justify-content:center;z-index:30;color:#fff;font-size:28px;font-weight:800;box-shadow:0 12px 40px rgba(124,58,237,0.12);animation:checkPop .36s ease forwards}
@keyframes checkPop{0%{transform:translate(-50%,-60%) scale(.6);opacity:0}60%{transform:translate(-50%,-50%) scale(1.08);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.pay-check.fade-away{animation:checkFade .28s ease forwards}
@keyframes checkFade{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-40%) scale(.9)}}
.particles{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);pointer-events:none;z-index:29}
.particle{position:absolute;width:8px;height:8px;border-radius:50%;opacity:0;transform:translate(-50%,-50%);background:var(--am);animation:partMove .6s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes partMove{0%{opacity:1;transform:translate(-50%,-50%) scale(0.6)}100%{opacity:0;transform:translate(var(--tx,0),var(--ty,0)) scale(1.2)}}
/* settings dropdown */
#settings-panel{position:absolute;right:20px;top:70px;background:var(--surf);border:1px solid var(--bord2);padding:12px;border-radius:10px;box-shadow:0 14px 40px rgba(124,58,237,0.06);display:none;z-index:200}
#settings-panel.show{display:block}
.setting{display:flex;align-items:center;gap:10px;padding:8px 6px}
.switch{width:44px;height:24px;border-radius:99px;background:var(--bord2);position:relative}
.switch.on{background:linear-gradient(135deg,var(--gr),#34d399)}
.switch .dot{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .18s}
.switch.on .dot{transform:translateX(20px)}
.select{padding:8px;border-radius:8px;border:1px solid var(--bord2);background:transparent;color:var(--tx)}
.range{width:120px}
#install-bar{display:none;margin:0 20px 12px;background:linear-gradient(90deg,rgba(124,58,237,0.06),rgba(124,58,237,0.03));border:1px solid var(--bord2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--ac);align-items:center;gap:10px;font-weight:700}
#install-bar.show{display:flex}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <span class="app-lbl">O Que Devo</span>
      <div class="controls">
        <button id="btn-settings" title="Configurações" onclick="toggleSettings()">⚙</button>
        <button id="btn-add" onclick="openMod()">+</button>
      </div>
    </div>
    <div class="hero">
      <p class="hero-lbl">Total em aberto</p>
      <p class="hero-val" id="htotal">R$ 0,00</p>
      <p class="hero-sub" id="hsub">carregando...</p>
    </div>
    <div class="stats">
      <div class="sc"><p class="sc-lbl">Já pago</p><p class="sc-val g" id="spaid">R$ 0,00</p></div>
      <div class="sc"><p class="sc-lbl">Pendente</p><p class="sc-val r" id="spend">R$ 0,00</p></div>
    </div>
    <div id="install-bar" onclick="doInstall()">
      ⬇ Toque para instalar o app no seu celular
      <span onclick="event.stopPropagation();this.parentElement.classList.remove('show')" style="margin-left:auto;opacity:.6">✕</span>
    </div>
    <div class="filters">
      <button class="fb on" onclick="setF('all',this)">Todas</button>
      <button class="fb" onclick="setF('pending',this)">Pendentes</button>
      <button class="fb" onclick="setF('paid',this)">Pagas</button>
    </div>
  </div>
  <div class="scroll">
    <div id="lst"></div>
    <div id="empty" class="empty" style="display:none">
      <div class="empty-ico">💸</div>
      <p class="empty-tx">Nenhuma conta aqui.<br>Toque no + para adicionar.</p>
    </div>
  </div>
  <div id="ov" onclick="ovClick(event)">
    <div class="mod">
      <div class="mhandle"></div>
      <div class="mhdr">
        <span class="mtitle" id="mtitle">Nova conta</span>
        <button class="mclose" onclick="closeMod()">✕</button>
      </div>
      <div class="mbody">
        <div class="fld"><label>Nome / Descrição</label><input id="iname" type="text" placeholder="Ex: Aluguel, Cartão, Luz..." autocomplete="off"/></div>
        <div class="fld"><label>Valor (R$)</label><input id="ival" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0,00"/></div>
        <div class="fld"><label>Data de vencimento</label><input id="idate" type="date"/></div>
        <div class="ptog" onclick="togPaid()">
          <div class="ttrack" id="ttrack"><div class="tthumb"></div></div>
          <span class="plbl">Marcar como pago</span>
        </div>
      </div>
      <p class="merr" id="merr" style="display:none">Preencha todos os campos.</p>
      <div class="mfoot">
        <button class="bcancel" onclick="closeMod()">Cancelar</button>
        <button class="bsave" onclick="saveIt()">Salvar</button>
      </div>
    </div>
  </div>
  <div id="settings-panel">
    <div class="setting"><label>Som</label><div id="sound-switch" class="switch" onclick="toggleSetting('sound')"><div class="dot"></div></div></div>
    <div class="setting"><label>Haptics</label><div id="vib-switch" class="switch" onclick="toggleSetting('vibrate')"><div class="dot"></div></div></div>
    <div class="setting"><label>Animação</label>
      <select id="anim-select" class="select" onchange="changeAnim()">
        <option value="subtle">Sutil</option>
        <option value="default">Padrão</option>
        <option value="dramatic">Dramático</option>
      </select>
    </div>
    <div class="setting"><label>Volume</label><input id="vol-range" class="range" type="range" min="0" max="1" step="0.01" value="0.15" onchange="changeVol(this.value)" /></div>
    <div class="setting" style="justify-content:space-between"><span>Testar som</span><button class="bsave" onclick="testSound()">Tocar</button></div>
    <div style="text-align:right;margin-top:8px"><button onclick="closeSettings()" class="bsave">Fechar</button></div>
  </div>
</div>
<script>
const K='qdv4';
let items=[],editId=null,filt='all',paidSt=false,deferredPrompt=null;
let settings = {sound:true,vibrate:true,anim:'default',volume:0.15};

// load settings and data
function load(){
  try{ items = JSON.parse(localStorage.getItem(K)||'[]'); }catch(e){ items=[]; }
  try{ const s = JSON.parse(localStorage.getItem(K+'_settings')||'null'); if(s) settings=Object.assign(settings,s); }catch(e){}
}

function saveSettings(){ try{ localStorage.setItem(K+'_settings',JSON.stringify(settings)); }catch(e){} updateSettingsUI(); }

function updateSettingsUI(){
  document.getElementById('sound-switch').classList.toggle('on', !!settings.sound);
  document.querySelector('#sound-switch .dot').style.transform = settings.sound ? 'translateX(20px)' : 'translateX(0)';
  document.getElementById('vib-switch').classList.toggle('on', !!settings.vibrate);
  document.querySelector('#vib-switch .dot').style.transform = settings.vibrate ? 'translateX(20px)' : 'translateX(0)';
  document.getElementById('anim-select').value = settings.anim || 'default';
  document.getElementById('vol-range').value = settings.volume || 0.15;
}

function toggleSetting(k){ settings[k] = !settings[k]; saveSettings(); }
function changeAnim(){ settings.anim = document.getElementById('anim-select').value; saveSettings(); }
function changeVol(v){ settings.volume = Number(v); saveSettings(); }
function toggleSettings(){ document.getElementById('settings-panel').classList.toggle('show'); }
function closeSettings(){ document.getElementById('settings-panel').classList.remove('show'); }

// service worker: register real sw.js when available
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(err=>{
    // fallback: ignore registration errors
    console.warn('sw register failed',err);
  });
}

function persist(){ try{ localStorage.setItem(K,JSON.stringify(items)); }catch(e){} }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fc(v){ return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fd(s){ if(!s) return ''; return new Date(s+'T00:00:00').toLocaleDateString('pt-BR'); }
function isOv(i){ if(i.paid) return false; const n=new Date(); n.setHours(0,0,0,0); return new Date(i.date+'T00:00:00')<n; }
function st(i){ if(i.paid) return 'paid'; return isOv(i)?'overdue':'pending'; }
function stL(s){ return {paid:'Pago',pending:'Pendente',overdue:'Atrasado'}[s]; }
function esc(s){ if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  const totalAll = items.reduce((a,i)=>a+Number(i.value||0),0);
  const paidTotal = items.filter(i=>i.paid).reduce((a,i)=>a+Number(i.value||0),0);
  const pendingTotal = items.filter(i=>!i.paid).reduce((a,i)=>a+Number(i.value||0),0);
  const overdueCount = items.filter(i=>!i.paid && isOv(i)).length;
  const htotal = document.getElementById('htotal');
  htotal.textContent = fc(pendingTotal);
  htotal.classList.toggle('zero', pendingTotal===0);
  htotal.classList.toggle('overdue', overdueCount>0);
  document.getElementById('spaid').textContent = fc(paidTotal);
  document.getElementById('spend').textContent = fc(pendingTotal);
  document.getElementById('hsub').textContent = items.length+' contas • Total geral: '+fc(totalAll)+(overdueCount?(' • '+overdueCount+' atrasada(s)'):'');

  const lst = document.getElementById('lst'); lst.innerHTML='';
  const visible = items.filter(i=> (filt==='all')?true:(filt==='paid')?i.paid:!i.paid );
  if(!visible.length){ document.getElementById('empty').style.display='flex'; return; } else { document.getElementById('empty').style.display='none'; }
  visible.sort((a,b)=> new Date(a.date) - new Date(b.date));
  visible.forEach(i=>{
    const s = st(i);
    const card = document.createElement('div'); card.className='card '+s; card.dataset.id = i.id;
    const stripe = document.createElement('div'); stripe.className='cstripe '+s; card.appendChild(stripe);
    const body = document.createElement('div'); body.className='cbody';
    const row1 = document.createElement('div'); row1.className='crow1';
    const cname = document.createElement('div'); cname.className='cname'; cname.textContent = i.name;
    const camt = document.createElement('div'); camt.className='camt '+s; camt.textContent = fc(i.value);
    row1.appendChild(cname); row1.appendChild(camt);
    const row2 = document.createElement('div'); row2.className='crow2';
    const cdate = document.createElement('div'); cdate.className='cdate'; cdate.textContent = fd(i.date);
    const badge = document.createElement('div'); badge.className='badge '+s; badge.textContent = stL(s);
    row2.appendChild(cdate); row2.appendChild(badge);
    body.appendChild(row1); body.appendChild(row2);
    const acts = document.createElement('div'); acts.className='cacts';
    const btnPay = document.createElement('button'); btnPay.className='ab pay'; btnPay.textContent='Marcar'; btnPay.onclick = ()=>{ togglePaid(i.id); };
    const btnEdit = document.createElement('button'); btnEdit.className='ab'; btnEdit.textContent='Editar'; btnEdit.onclick = ()=>{ openMod(i.id); };
    const btnDel = document.createElement('button'); btnDel.className='ab del'; btnDel.textContent='Excluir'; btnDel.onclick = ()=>{ del(i.id); };
    acts.appendChild(btnPay); acts.appendChild(btnEdit); acts.appendChild(btnDel);
    card.appendChild(body); card.appendChild(acts);
    lst.appendChild(card);
  });
}

function setF(f,btn){ filt=f; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on')); if(btn) btn.classList.add('on'); render(); }

// Audio: short beep using Web Audio API, with volume and resume
let audioCtx=null; let audioGain=null;
function ensureAudio(){ if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); audioGain = audioCtx.createGain(); audioGain.gain.value = settings.volume || 0.15; audioGain.connect(audioCtx.destination); }
  if(audioCtx.state === 'suspended'){
    return audioCtx.resume();
  }
  return Promise.resolve();
}
function playBeep(){ if(!settings.sound) return; ensureAudio().then(()=>{ try{ const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.value = 880; const g = audioGain; g.gain.cancelScheduledValues(audioCtx.currentTime); g.gain.setValueAtTime(settings.volume||0.15, audioCtx.currentTime); o.connect(g); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.25); o.stop(audioCtx.currentTime+0.26); }catch(e){console.warn('audio err',e);} }).catch(e=>{console.warn('audio resume err',e);}); }
function testSound(){ ensureAudio().then(()=>{ playBeep(); if(settings.vibrate && navigator.vibrate) navigator.vibrate(20); }).catch(()=>{ playBeep(); }); }

// Particle burst
function createParticles(card,intensity){ const pCount = intensity==='dramatic'?14:(intensity==='subtle'?6:10); const container = document.createElement('div'); container.className='particles'; card.appendChild(container);
  for(let i=0;i<pCount;i++){ const part = document.createElement('div'); part.className='particle'; const angle = (Math.PI*2/pCount)*i + (Math.random()*0.2-0.1); const dist = 36 + Math.random()*44; const tx = Math.cos(angle)*dist + 'px'; const ty = Math.sin(angle)*dist + 'px'; part.style.setProperty('--tx', tx); part.style.setProperty('--ty', ty); part.style.background = (i%2? 'var(--ac)':'var(--am)'); container.appendChild(part); }
  setTimeout(()=>{ if(container && container.parentElement) container.parentElement.removeChild(container); }, 900);
}

function togglePaid(id){ const i = items.find(x=>x.id===id); if(!i) return; const card = document.querySelector(`.card[data-id="${id}"]`); if(card){ if(card.classList.contains('animating')) return; card.classList.add('animating'); const willMark = !i.paid; const animClass = willMark ? 'pay-anim' : 'unpay-anim'; card.classList.add(animClass);
    let checkEl=null;
    if(willMark){ checkEl = document.createElement('div'); checkEl.className = 'pay-check'; checkEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'; card.appendChild(checkEl); createParticles(card, settings.anim); playBeep(); if(settings.vibrate && navigator.vibrate) try{ navigator.vibrate(12); }catch(e){} }
    else { if(settings.vibrate && navigator.vibrate) try{ navigator.vibrate(6); }catch(e){} }
    const onEnd = (e)=>{ if(e.animationName && (e.animationName.includes('payAnim') || e.animationName.includes('unpayAnim'))){ card.removeEventListener('animationend', onEnd); card.classList.remove(animClass); if(checkEl){ checkEl.classList.add('fade-away'); setTimeout(()=>{ if(checkEl && checkEl.parentElement) checkEl.parentElement.removeChild(checkEl); },320); } card.classList.remove('animating'); i.paid = !i.paid; persist(); render(); } };
    card.addEventListener('animationend', onEnd);
  } else { i.paid = !i.paid; persist(); render(); }
}

function del(id){ if(confirm('Excluir esta conta?')){ items = items.filter(x=>x.id!==id); persist(); render(); } }

function openMod(id){ editId = id || null; document.getElementById('merr').style.display='none'; paidSt = false; document.getElementById('ttrack').className='ttrack'; if(id){ const it = items.find(x=>x.id===id); if(it){ document.getElementById('mtitle').textContent='Editar conta'; document.getElementById('iname').value = it.name || ''; document.getElementById('ival').value = Number(it.value||0); document.getElementById('idate').value = it.date || ''; paidSt = !!it.paid; if(paidSt) document.getElementById('ttrack').className='ttrack on'; } } else { document.getElementById('mtitle').textContent='Nova conta'; document.getElementById('iname').value = ''; document.getElementById('ival').value = ''; document.getElementById('idate').value = ''; paidSt = false; } document.getElementById('ov').classList.add('open'); }
function closeMod(){ document.getElementById('ov').classList.remove('open'); }
function ovClick(e){ if(e.target.id==='ov') closeMod(); }
function togPaid(){ paidSt = !paidSt; document.getElementById('ttrack').className = 'ttrack'+(paidSt?' on':''); }

function saveIt(){ const name = document.getElementById('iname').value.trim(); const valRaw = document.getElementById('ival').value; const date = document.getElementById('idate').value; const err = document.getElementById('merr'); const val = parseFloat(valRaw) || 0; if(!name || !date || isNaN(val)){ err.style.display='block'; return; } err.style.display='none'; if(editId){ const it = items.find(x=>x.id===editId); if(it){ it.name = name; it.value = Number(val.toFixed(2)); it.date = date; it.paid = !!paidSt; } } else { items.push({id: genId(), name, value: Number(val.toFixed(2)), date, paid: !!paidSt}); } persist(); render(); closeMod(); }

// init
load(); updateSettingsUI(); render();
</script>
